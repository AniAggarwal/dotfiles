# VARS
# sets file manager
$fileManager = kitty -e yazi
# Force Hyprland to use iGPU
env = AQ_DRM_DEVICES, /dev/dri/intel-igpu

# ============================================================================
# NVIDIA dGPU Power Saving - Added 2026-01-29
# ============================================================================
# Problem: Apps enumerate the NVIDIA GPU even when not using it, preventing
#          the dGPU from entering D3 (suspended) state and wasting battery.
#
# Solution: Block Vulkan/EGL from seeing NVIDIA by default. The dGPU will
#           suspend when nothing touches it.
#
# To run apps on the NVIDIA GPU, use: prime-run <application>
# Example: prime-run mpv --hwdec=nvdec video.mp4
#
# CUDA applications work without prime-run (CUDA doesn't use Vulkan/EGL).
#
# If you experience graphics issues, comment out these two env lines:
# ----------------------------------------------------------------------------
env = VK_DRIVER_FILES,/usr/share/vulkan/icd.d/intel_icd.json
env = __EGL_VENDOR_LIBRARY_FILENAMES,/usr/share/glvnd/egl_vendor.d/50_mesa.json
# ============================================================================

env = XCURSOR_SIZE,24

# Not sure if this actually sets the theme
env = GTK_THEME,Graphite-Dark

env = GDK_BACKEND,wayland,x11

exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"   # for GTK4 apps
#for gtk3 apps you need to install adw-gtk3 theme (in arch linux sudo pacman -S adw-gtk-theme)
# exec = gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3"   # for GTK3 apps
#for kde apps you need to install: sudo pacman -S qt5ct qt6ct kvantum kvantum breeze-icons   
#you will need to set dark theme for qt apps from kde more difficult thans with gnome :D:
env = QT_QPA_PLATFORMTHEME,qt6ct   # for Qt apps# Theme


# XDG vars
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# QT
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland;xcb

# For IME Input
env = XMODIFIERS DEFAULT,@im=fcitx
# as per fcitx wiki, do NOT set GTK_IM_MODULE
env = QT_IM_MODULES,wayland;fcitx;ibus

# Hypr vars
$main_mod = SUPER

# BINDS

binds {
    focus_preferred_method = 0
    movefocus_cycles_fullscreen = 0
}

# Brightness
binde = , XF86MonBrightnessUp, exec, brightnessctl set 10%+
binde = SHIFT, XF86MonBrightnessUp, exec, brightnessctl set 1%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
binde = SHIFT, XF86MonBrightnessDown, exec, brightnessctl set 1%-

# Unneeded. For some reason this already works
# bind = , XF86KbdLightOnOff, exec, brightnessctl --device='dell::kbd_backlight' set 1+

# Volume
binde = , XF86AudioRaiseVolume, exec, $scripts_path/adjust-volume.sh sink 5%+
binde = , XF86AudioLowerVolume, exec, $scripts_path/adjust-volume.sh sink 5%- 
binde = SHIFT, XF86AudioRaiseVolume, exec, $scripts_path/adjust-volume.sh sink 1%+
binde = SHIFT, XF86AudioLowerVolume, exec, $scripts_path/adjust-volume.sh sink 1%- 
binde = , XF86AudioMute, exec, $scripts_path/mute-volume.sh sink toggle

binde = ALT, XF86AudioRaiseVolume, exec, $scripts_path/adjust-volume.sh source 5%+
binde = ALT, XF86AudioLowerVolume, exec, $scripts_path/adjust-volume.sh source 5%- 
binde = ALT, XF86AudioMute, exec, $scripts_path/mute-volume.sh source toggle

# Lock
bind = $main_mod, S, exec, hyprlock &
bind = $main_mod SHIFT, S, exec, sh systemctl suspend-then-hibernate &
bind = $main_mod CTRL SHIFT, S, exec, sh systemctl hiberate &

bind = $main_mod, Print, exec, hyprshot -z -m region -o ~/Downloads/
bind = $main_mod SHIFT, Print, exec, hyprshot -z -m region --clipboard-only
bind = $main_mod CTRL, Print, exec, hyprshot -z -m output -o ~/Downloads/
bind = $main_mod CTRL SHIFT, Print, exec, hyprshot -z -m output --clipboard-only

# Suspend, hiberate
bindl = , switch:off:Lid Switch, exec, systemctl hibernate

# Pause, play, next, previous for music
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Pypr binds
# bind = $main_mod SHIFT, E, exec, pypr expose  # disabled: crashes Hyprland v0.54.1 (SEGV in CDecorationPositioner::onWindowUpdate). Draft: ~/.config/hypr/hyprland-crash-expose-draft.md
bind = $main_mod, M, togglespecialworkspace, stash # toggles "stash" special workspace visibility
bind = $main_mod SHIFT, M, exec, pypr toggle_special stash # moves window to/from the "stash" workspace

bind = $main_mod CTRL SHIFT, M, exit, 
bind = $main_mod SHIFT, M, forcerendererreload

bind = $main_mod, C, killactive, 
bind = $main_mod, V, togglefloating, 
bind = $main_mod SHIFT, V, pseudo, # dwindle
bind = $main_mod, R, exec, wofi --show drun
bind = $main_mod, W, layoutmsg, togglesplit

bind = $main_mod, Q, exec, kitty
bind = $main_mod SHIFT, Q, exec, pypr toggle term
bind = $main_mod, O, exec, rofi -show drun -theme $rofi_path
bind = $main_mod SHIFT, O, exec, pypr menu

bind = $main_mod, E, exec, $fileManager

bind = $main_mod, B, exec, brave
bind = $main_mod SHIFT, B, exec, brave --incognito

# TODO: make ime work
