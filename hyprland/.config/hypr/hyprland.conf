# Fallback for any other monitor
monitor = , preferred, auto, 1

# disable non-named monitors
# monitor = , disable

# RENDER
# For HDR, but currently doesnt' work
render {
    cm_auto_hdr = 2         # auto-switch to HDR (hdredid) for fullscreen HDR content
    cm_fs_passthrough = 2   # ensure fullscreen HDR content is passed through (HDR only)
}

# unscale XWayland, causing blurriness
xwayland {
  force_zero_scaling = true
}


# INPUT
input {
    kb_layout = us,jp
    numlock_by_default = true

    repeat_rate = 50

    sensitivity = 0
    follow_mouse = 2
    float_switch_override_focus = 0

    touchpad {
        natural_scroll = yes
    }
}

# GESTURES
gesture = 3, horizontal, workspace

# GENERAL
general {
    gaps_in = 2
    gaps_out = 3
    border_size = 2

    col.active_border = rgba(ffffffaa) rgba(5c5c5c99) 45deg
    col.inactive_border = rgba(595959aa)


    resize_on_border = true
    extend_border_grab_area = 30

    layout = dwindle
}

group {
    groupbar {
        render_titles = false
        gradients = false
        height = 0
        indicator_gap = 0
        indicator_height = 4
        rounding = 10
        rounding_power = 2.5

        col.inactive = rgba(ffffff29) rgba(5c5c5c99) 90deg
        col.active = rgba(ffffffaa) rgba(5c5c5c99) 45deg 
        col.locked_inactive = rgba(a3948199) rgba(5c5c5c00) 90deg
        col.locked_active = rgba(f0e0ccb9) rgba(ffffff00) 90deg
    }
    col.border_active = rgba(ffffffaa) rgba(5c5c5c99) 45deg
    col.border_inactive = rgba(595959aa)

    col.border_locked_active = rgba(f0e0ccb9) rgba(5c5c5c99) 90deg
    col.border_locked_inactive = rgba(a3948199) rgba(a3948199) 90deg
}

# MISC
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    # enable_swallow = true
    swallow_regex = ^(kitty)$

    # save battery when no movement
    vfr = true
    vrr = 0
}

# DECORATION
decoration {
    rounding = 6

    # drop_shadow = false
    # shadow_range = 4
    # shadow_render_power = 3
    # col.shadow = rgba(1a1a1aee)
    shadow {
        enabled = false
    }
    
    blur {
        enabled = false
        size = 10
        passes = 5
        new_optimizations = on
        xray = false

        ignore_opacity = true
    }
}

# ANIMATIONS
animations {
    enabled = yes
    bezier = overshot, 0.05, 0.9, 0.1, 1.02
    bezier = swipe, 0.05, 0.9, 0.1, 1
    
    animation = fadeSwitch, 1, 3, default,

    animation = windowsIn, 1, 1, overshot,
    animation = windowsOut, 1, 1, overshot,
    animation = windowsMove, 1, 2, overshot,

    animation = workspaces, 1, 2, swipe, slide
}

# LAYOUTS
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
}


